<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Piano Deri</title>
<link rel="stylesheet" href="assets/piano-theme.css">
<style>
body{display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0}
.login-box{width:100%;max-width:380px;padding:0 20px;text-align:center}
</style>
</head>
<body>
<div class="login-box">
  <div class="app-brand" id="brandClick" style="cursor:default;user-select:none">
    <div class="p">P</div>
    <div class="name">PIANO DERİ</div>
    <div class="sub">YÖNETİM SİSTEMİ</div>
  </div>
  <br>
  <a href="hotel/login.html" class="btn-gold" style="display:block;text-decoration:none;text-align:center;padding:14px;font-size:15px">
    🏨 Otel Girişi
  </a>
</div>
<script>
// Logoya 5 kez tıklayınca gizli giriş
let c=0,t;
document.getElementById('brandClick').addEventListener('click',()=>{
  c++; clearTimeout(t); t=setTimeout(()=>{c=0;},2000);
  if(c>=5){c=0;window.location.href='giris/index.html';}
});
</script>
</body>
</html>
