.tb-btn:hover{background:rgba(201,168,76,.2)}
.tb-btn.active{background:rgba(201,168,76,.2);border-color:var(--gold)}
.layout{display:grid;grid-template-columns:290px 1fr;height:calc(100vh - 46px)}
.panel{background:var(--bg2);border-right:1px solid var(--border);overflow-y:auto;display:flex;flex-direction:column}
.panel-hd{padding:10px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;position:sticky;top:0;background:var(--bg2);z-index:10}

.badge-ct{background:var(--gold);color:var(--dark);padding:2px 7px;font-size:10px;font-weight:700;border-radius:10px}
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--border);flex-shrink:0}
.stat{background:var(--card);padding:7px 4px;text-align:center}
.stat-val{font-size:18px;font-weight:900;line-height:1.2}
.stat-lbl{font-size:9px;color:var(--text2);letter-spacing:.08em}
.alert-box{margin:8px;border-radius:6px;padding:10px;flex-shrink:0;display:none}

.ab-row{font-size:11px;padding:3px 0;border-bottom:1px solid rgba(255,95,110,.1);display:flex;align-items:center;gap:5px}

.filter-btn{padding:4px 10px;border-radius:12px;font-size:10px;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--text2);transition:all .2s}
.filter-btn.active{border-color:var(--gold);color:var(--gold);background:rgba(201,168,76,.08)}
.veh-list{padding:6px;flex:1}
.veh-card{background:var(--card);border:1px solid var(--border);border-radius:6px;padding:10px;margin-bottom:5px;cursor:pointer;transition:all .2s}
.veh-card:hover{border-color:rgba(201,168,76,.3);background:#161524}
.veh-card.v-alert{border-left:3px solid var(--red);background:rgba(255,95,110,.05)}
.veh-card.v-near{border-left:3px solid var(--warn);background:rgba(245,158,11,.04)}

.veh-card.v-idle{border-left:3px solid var(--text2)}

.vc-top{display:flex;align-items:center;gap:8px;margin-bottom:5px}
.vc-plaka{font-size:13px;font-weight:700;flex:1}
.vc-status{font-size:10px;font-weight:700;padding:2px 7px;border-radius:8px;flex-shrink:0}

.km-summary{margin:6px;background:rgba(104,212,255,.06);border:1px solid rgba(104,212,255,.15);border-radius:6px;padding:10px;flex-shrink:0}

// ── HAVERSINE ───────────────────────────────────
function haversine(la1,lo1,la2,lo2){
  const R=6371,dLa=(la2-la1)*Math.PI/180,dLo=(lo2-lo1)*Math.PI/180;
  const a=Math.sin(dLa/2)**2+Math.cos(la1*Math.PI/180)*Math.cos(la2*Math.PI/180)*Math.sin(dLo/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

// ── SOAP İSTEĞİ ─────────────────────────────────
async function tnbSOAP(method,extra=''){
  const soap=`<?xml version="1.0" encoding="utf-8"?><soap:Envelope xmlns:soap="http://schemas.xmlsoap.org/soap/envelope/"><soap:Body><${method} xmlns="http://tempuri.org/"><firmaKodu>${TNB.firma}</firmaKodu><kullaniciAdi>${TNB.user}</kullaniciAdi><sifre>${TNB.pass}</sifre>${extra}</${method}></soap:Body></soap:Envelope>`;
  const r=await fetch(TNB.url,{method:'POST',headers:{'Content-Type':'text/xml; charset=utf-8','SOAPAction':`http://tempuri.org/${method}`},body:soap});
  return r.text();
}

function getTag(el,tag){const f=el.getElementsByTagName(tag);return f.length?f[0].textContent.trim():'';}

// ── VERİ ÇEK ───────────────────────────────────
async function fetchVehicles(){
  try {
    const xml=await tnbSOAP('wsGetLastLocations');
    const doc=new DOMParser().parseFromString(xml,'text/xml');
    const items=doc.getElementsByTagName('VehicleInfo');
    if(!items.length){
      // Demo mod — gerçek API boş döndüğünde simüle et
      demoMode();
      return;
    }
    const nv={};
    for(const item of items){
      const plaka=getTag(item,'PlateNo')||getTag(item,'Plate')||getTag(item,'plateNo');
      const lat=parseFloat(getTag(item,'Lat')||getTag(item,'Latitude')||'0');
      const lng=parseFloat(getTag(item,'Lng')||getTag(item,'Longitude')||'0');
      const hiz=parseFloat(getTag(item,'Speed')||'0');
      if(!plaka||!lat||!lng) continue;
      nv[plaka]={plaka,lat,lng,hiz,km:vehicles[plaka]?.km||0};
    }
    // Km raporu
    try{
      const td=new Date().toISOString().split('T')[0].replace(/-/g,'/');
      const kmXml=await tnbSOAP('wsMileageReport',`<baslangicTarih>${td}</baslangicTarih><bitisTarih>${td}</bitisTarih>`);
      const kmDoc=new DOMParser().parseFromString(kmXml,'text/xml');
      for(const ki of kmDoc.getElementsByTagName('MileageInfo')){
        const p=getTag(ki,'PlateNo')||getTag(ki,'Plate');
        const k=parseFloat(getTag(ki,'Mileage')||getTag(ki,'TotalDistance')||'0');
        if(p&&nv[p]) nv[p].km=k;
      }
    }catch(e){console.log('Km skip:',e.message);}
    vehicles=nv;
    updateAll();
    saveFirebase();
    document.getElementById('lastUpdate').textContent='Son: '+new Date().toLocaleTimeString('tr-TR');
    document.getElementById('liveDot').style.background='var(--green)';
  } catch(e){
    console.error('TNB:',e);
    document.getElementById('liveDot').style.background='var(--red)';
    demoMode();
  }
}

  demoVehs.forEach(v=>{vehicles[v.plaka]=v;});
  updateAll();
  document.getElementById('lastUpdate').textContent='Demo: '+new Date().toLocaleTimeString('tr-TR');
  document.getElementById('liveDot').style.background='var(--warn)';
}

// ── PROXIMITY ──────────────────────────────────
function checkProx(v){
  const dm=haversine(v.lat,v.lng,MERKEZ.lat,MERKEZ.lng);
  if(dm<=MERKEZ.uyariKm) return {type:'alert',label:`⚠️ ${(dm*1000).toFixed(0)}m`,dist:dm,otel:'MAĞAZA'};
  let best=null;
  for(const o of OTELLER){
    const d=haversine(v.lat,v.lng,o.lat,o.lng);
    if(d*1000<=o.uyariM) return {type:'alert',label:'⚠️ OTELDE',dist:d,otel:o.ad};
    if(d*1000<=o.uyariM*3&&(!best||d<best.dist)) best={type:'near',label:`${(d*1000).toFixed(0)}m`,dist:d,otel:o.ad};
  }
  if(best) return {...best,distMagaza:dm};
  return {type:v.hiz<2?'idle':'move',label:v.hiz<2?'Bekliyor':'Hareket',dist:dm,otel:null,distMagaza:dm};
}

// ── GÜNCELLE ───────────────────────────────────
function updateAll(){
  const list=Object.values(vehicles);
  let cM=0,cI=0,cA=0,alerts=[];
  list.forEach(v=>{
    v._prox=checkProx(v);
    if(v._prox.type==='alert') cA++;
    else if(v._prox.type==='idle') cI++;
    else cM++;
    if(v._prox.type==='alert') alerts.push(v);
  });
  document.getElementById('sMove').textContent=cM;
  document.getElementById('sIdle').textContent=cI;
  document.getElementById('sAlert').textContent=cA;
  document.getElementById('sOnline').textContent=list.length;
  document.getElementById('totalBadge').textContent=list.length;
  // Km
  const kms=list.map(v=>v.km).filter(k=>k>0);
  if(kms.length){
    const tot=kms.reduce((s,k)=>s+k,0);
    document.getElementById('kmTotal').textContent=tot.toFixed(0)+' km';
    document.getElementById('kmAvg').textContent=(tot/list.length).toFixed(0)+' km';
    document.getElementById('kmMax').textContent=Math.max(...kms).toFixed(0)+' km';
    document.getElementById('kmMin').textContent=Math.min(...kms).toFixed(0)+' km';
  }
  // Alerts
  const ab=document.getElementById('alertBox');
  if(alerts.length){
    ab.classList.add('show');
    document.getElementById('alertList').innerHTML=alerts.map(v=>
      `<div class="ab-row">🔴 <b>${v.plaka}</b> → ${v._prox.otel} (${v._prox.label})</div>`).join('');
    alerts.forEach(v=>{
      const k=v.plaka+v._prox.otel;
      if(!prevAlerts.has(k)){
        showNotif(`🚨 ${v.plaka} — ${v._prox.otel} yaklaşıyor!`,'n-alert');
        try{const c=new(window.AudioContext||window.webkitAudioContext)();const o=c.createOscillator();o.connect(c.destination);o.frequency.value=880;o.start();o.stop(c.currentTime+.15);}catch(e){}
      }
      prevAlerts.add(k);
    });
    const ck=new Set(alerts.map(v=>v.plaka+v._prox.otel));
    for(const k of prevAlerts) if(!ck.has(k)) prevAlerts.delete(k);
  } else { ab.classList.remove('show'); prevAlerts.clear(); }

  renderList(list);
  updateMarkers(list);
}

// ── LİSTE ─────────────────────────────────────
function renderList(list){
  const f=currentFilter==='all'?list:list.filter(v=>v._prox?.type===currentFilter||(currentFilter==='move'&&v._prox?.type==='near'));
  document.getElementById('vehList').innerHTML=f.map(v=>{
    const p=v._prox||{type:'idle',label:'—',distMagaza:0};
    const sc={alert:'st-alert',near:'st-near',move:'st-move',idle:'st-idle'}[p.type];
    const cc={alert:'v-alert',near:'v-near',move:'v-move',idle:'v-idle'}[p.type];
    const sel=selectedPlaka===v.plaka?' selected':'';
    const bar=Math.min(100,(v.hiz/120)*100);
    const bc=p.type==='alert'?'#ff5f6e':p.type==='near'?'#f59e0b':'#35d979';
    return `<div class="veh-card ${cc}${sel}" onclick="selectVeh('${v.plaka}')">
      <div class="vc-top"><span>🚗</span><div class="vc-plaka">${v.plaka}</div><div class="vc-status ${sc}">${p.label}</div></div>
      <div class="vc-info"><span>⚡ ${v.hiz.toFixed(0)} km/s</span><span>📏 ${(p.distMagaza||0).toFixed(1)} km</span>${v.km>0?`<span style="color:var(--blue)">🛣 ${v.km.toFixed(0)}km</span>`:''}</div>
      ${p.otel&&p.otel!=='MAĞAZA'?`<div style="font-size:10px;color:var(--text2);margin-top:2px">📍 ${p.otel}</div>`:''}
      <div class="vc-bar"><div class="vc-fill" style="width:${bar}%;background:${bc}"></div></div>
    </div>`;
  }).join('')||'<div style="text-align:center;padding:20px;color:var(--text2);font-size:12px">Bu filtrede araç yok</div>';
}

// ── MARKERLERİ GÜNCELLE ────────────────────────
function updateMarkers(list){
  list.forEach(v=>{
    const p=v._prox||{type:'idle'};
    const c={alert:'#ff5f6e',near:'#f59e0b',move:'#35d979',idle:'#9597a5'}[p.type];
    const icon=L.divIcon({className:'',
      html:`<div style="display:flex;flex-direction:column;align-items:center;gap:1px"><div style="background:#14161f;border:2px solid ${c};border-radius:5px;width:30px;height:22px;display:flex;align-items:center;justify-content:center;font-size:13px;box-shadow:0 2px 8px rgba(0,0,0,.8)">🚗</div><div style="font-size:9px;color:${c};background:rgba(7,8,15,.85);padding:1px 4px;border-radius:3px;white-space:nowrap;font-weight:700">${v.plaka.split(' ').pop()}</div></div>`,
      iconSize:[30,40],iconAnchor:[15,40]
    });
    if(markerMap[v.plaka]){markerMap[v.plaka].setLatLng([v.lat,v.lng]);markerMap[v.plaka].setIcon(icon);}
    else{
      const m=L.marker([v.lat,v.lng],{icon,zIndexOffset:200}).addTo(map);
      m.bindPopup(()=>`<b style="color:#c9a84c">${v.plaka}</b><br>Hız: ${v.hiz.toFixed(0)} km/s<br>Mağaza: ${(v._prox?.distMagaza||0).toFixed(2)} km<br>Günlük: ${v.km.toFixed(0)} km`);
      markerMap[v.plaka]=m;
    }
  });
}

// ── KONTROLLER ─────────────────────────────────
function selectVeh(plaka){
  selectedPlaka=selectedPlaka===plaka?null:plaka;
  if(selectedPlaka&&vehicles[plaka]){
    const v=vehicles[plaka];
    map.setView([v.lat,v.lng],15);
    if(markerMap[plaka]) markerMap[plaka].openPopup();
  }
  renderList(Object.values(vehicles));
}
function setFilter(btn,t){
  currentFilter=t;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderList(Object.values(vehicles));
}
function refreshAll(){fetchVehicles();}
function fitMap(){
  const pts=Object.values(vehicles).filter(v=>v.lat&&v.lng).map(v=>[v.lat,v.lng]);
  if(pts.length) map.fitBounds(pts,{padding:[40,40]});
}
function toggleAuto(){
  autoRefresh=!autoRefresh;
  const btn=document.getElementById('btnAuto');
  if(autoRefresh){autoTimer=setInterval(fetchVehicles,15000);btn.textContent='⏱ Oto: Açık';btn.classList.add('active');}
  else{clearInterval(autoTimer);btn.textContent='⏱ Oto: Kapalı';btn.classList.remove('active');}
}

// ── BİLDİRİM ──────────────────────────────────
function showNotif(msg,cls='n-ok'){
  const c=document.getElementById('notifContainer');
  const el=document.createElement('div');
  el.className=`notif-item ${cls}`;el.textContent=msg;
  c.appendChild(el);setTimeout(()=>el.remove(),6000);
}

// ── FİREBASE ──────────────────────────────────
function saveFirebase(){
  if(!db) return;
  const data={};
  Object.values(vehicles).forEach(v=>{
    const k=v.plaka.replace(/\s/g,'_');
    data[k]={plaka:v.plaka,lat:v.lat,lng:v.lng,hiz:v.hiz,km:v.km,zaman:new Date().toISOString(),tip:v._prox?.type||'move',distMagaza:v._prox?.distMagaza||0};
  });
  db.ref('araclar').set(data).catch(e=>console.log('FB:',e));
}

// ── BAŞLAT ─────────────────────────────────────
async function init(){
  document.getElementById('loadingText').textContent='Harita yükleniyor...';
  initMap();
  if(FIREBASE_CONFIG.apiKey!=='FIREBASE_API_KEY_BURAYA'){
    try{firebase.initializeApp(FIREBASE_CONFIG);db=firebase.database();}catch(e){console.log('FB:',e);}
  }
  document.getElementById('loadingText').textContent='TNB Mobil bağlanıyor...';
  await fetchVehicles();
  autoTimer=setInterval(fetchVehicles,15000);
  document.getElementById('loadingOverlay').style.display='none';
  showNotif('✅ Sistem aktif — 15 sn otomatik yenileme','n-ok');
}
window.addEventListener('load',init);
</script>
