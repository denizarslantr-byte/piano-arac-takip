<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Piano Deri Otel Girişi</title>
  <link rel="stylesheet" href="../assets/piano-theme.css">
  <!-- PWA -->
  <link rel="manifest" href="/hotel/manifest.json">
  <meta name="theme-color" content="#d8aa4b">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="PD Otel">
  <link rel="apple-touch-icon" href="../icons/otel-192.png">
  <link rel="apple-touch-icon" sizes="152x152" href="../icons/otel-152.png">
  <link rel="apple-touch-icon" sizes="144x144" href="../icons/otel-144.png">
</head>
<body>
<div class="app" style="max-width:460px">
  <div class="app-brand">
    <div class="p">P</div>
    <div class="name">PIANO DERİ</div>
    <div class="sub">OTEL GİRİŞİ</div>
  </div>
  <div id="apiWarning" class="notice" style="display:none"></div>
  <div class="panel-card">
    <h2 style="color:var(--gold2);margin-top:0">Giriş Yapın</h2>
    <div style="margin-bottom:12px">
      <label>Kullanıcı Kodu</label>
      <input id="code" placeholder="Örn: PD001" autocomplete="username">
    </div>
    <div style="margin-bottom:14px">
      <label>Şifre</label>
      <input id="password" type="password" placeholder="Şifreniz" autocomplete="current-password"
             onkeydown="if(event.key==='Enter')login()">
    </div>
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:14px;color:#c0c0c0;font-size:13px">
      <input type="checkbox" id="rememberMe">
      <span>Beni hatırla</span>
    </div>
    <button class="btn-gold" style="width:100%" onclick="login()">GİRİŞ YAP</button>
    <div id="loginErr" class="notice" style="display:none;margin-top:11px"></div>
  </div>
</div>
<script src="../config/config.js?v=v20260519-v18-dual-plate-coord-merkez"></script>
<script src="../config/firebase.js?v=v20260519-v18-dual-plate-coord-merkez"></script>
<script src="../assets/common.js?v=v20260519-v18-dual-plate-coord-merkez"></script>
<script src="../assets/firebase-api.js?v=v20260519-v18-dual-plate-coord-merkez"></script>
<script>
showApiWarning();
window.addEventListener("load",()=>{
  if (localStorage.getItem("hotel")) { location.href="mobile-hotel-panel.html"; return; }
  const c=localStorage.getItem("remCode"), p=localStorage.getItem("remPass");
  if(c){code.value=c;password.value=p||"";rememberMe.checked=true;}
});
async function login(){
  const c=code.value.trim(), p=password.value.trim();
  if(!c||!p){loginErr.innerText="Kod ve şifre zorunlu";loginErr.style.display="block";return;}
  const hotelData = await loginHotel(c, p);
  const r = hotelData ? {success:true, hotel:hotelData.hotel, code:hotelData.code} : {success:false, message:"Hatalı kullanici kodu veya sifre"};
  if(r.success){
    localStorage.setItem("hotel",r.hotel);
    localStorage.setItem("hotelCode",r.code);
    if(rememberMe.checked){localStorage.setItem("remCode",c);localStorage.setItem("remPass",p);}
    else{localStorage.removeItem("remCode");localStorage.removeItem("remPass");}
    location.href="mobile-hotel-panel.html";
  }else{
    loginErr.innerText="❌ "+(r.message||"Hatalı giriş");
    loginErr.style.display="block";
  }
}
</script>

<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/hotel/sw.js', {scope: '/hotel/'})
      .catch(e => console.log('SW error:', e));
  });
}
</script>
</body>
</html>
