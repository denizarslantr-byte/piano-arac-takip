<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<title>Piano Deri — Patron</title>
<style>
:root{
  --gold:#d6a63f;--gold2:#ffe58d;
  --bg:#07080f;--bg2:#0f1017;--bg3:#14161f;--card:#181b27;
  --border:#252836;--text:#f0f0f2;--text2:#9597a5;
  --green:#35d979;--blue:#68d4ff;--red:#ff5f6e;--warn:#f59e0b;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;background:var(--bg);color:var(--text);font-family:"Segoe UI",Arial,sans-serif;min-height:100vh;padding-bottom:80px}

/* ── HEADER ── */
.hdr{background:linear-gradient(180deg,#0a0b14,var(--bg2));border-bottom:1px solid var(--border);padding:14px 16px 10px;position:sticky;top:0;z-index:100;backdrop-filter:blur(8px)}
.hdr-top{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.hdr-brand{font-size:11px;letter-spacing:3px;color:var(--gold2);font-weight:900;flex:1}
.hdr-date-row{display:flex;align-items:center;gap:8px}
.date-lbl{font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.5px}
.date-input{background:var(--bg3);border:1px solid var(--border);border-radius:8px;color:var(--text);padding:7px 10px;font-size:13px;width:140px}
.date-input::-webkit-calendar-picker-indicator{filter:invert(0.7) brightness(1.5);opacity:.8;cursor:pointer}
.date-display{font-size:14px;font-weight:900;color:var(--gold2)}
.btn-refresh{background:var(--bg3);border:1px solid var(--border);border-radius:8px;color:var(--text2);padding:7px 11px;font-size:15px;cursor:pointer}
.btn-show{background:linear-gradient(135deg,#d6a63f,#a07830);border:none;border-radius:8px;color:#1a0f00;padding:7px 14px;font-size:13px;font-weight:900;cursor:pointer}

/* ── BOTTOM NAV ── */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:var(--bg2);border-top:1px solid var(--border);display:flex;z-index:200;padding-bottom:env(safe-area-inset-bottom)}
.bnav-btn{flex:1;border:none;background:transparent;color:var(--text2);padding:12px 8px 10px;font-size:11px;font-weight:700;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;letter-spacing:.3px;text-transform:uppercase}
.bnav-btn .ico{font-size:20px;line-height:1}
.bnav-btn.active{color:var(--gold2)}
.bnav-btn.active .ico{filter:drop-shadow(0 0 6px rgba(214,166,63,.7))}

/* ── SECTIONS ── */
.page{display:none;padding:12px 14px}
.page.active{display:block}

/* ── ÖZET KARTLAR ── */
.sum-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px}
.sum-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:12px 8px;text-align:center;cursor:pointer;transition:border-color .2s}
.sum-card.active-filter{border-color:var(--gold);background:rgba(214,166,63,.08)}
.sum-val{font-size:26px;font-weight:900;color:var(--gold2);line-height:1}
.sum-lbl{font-size:9px;color:var(--text2);text-transform:uppercase;letter-spacing:.4px;margin-top:5px;font-weight:700}
.sum-card.sc-inside .sum-val{color:#fde68a}
.sum-card.sc-done   .sum-val{color:var(--green)}
.sum-card.sc-satis  .sum-val{color:var(--blue)}
.sum-card.sc-bos    .sum-val{color:var(--red)}

/* ── OTEL FİLTRE ── */
.chips{display:flex;gap:6px;overflow-x:auto;padding:2px 0 10px;scrollbar-width:none}
.chips::-webkit-scrollbar{display:none}
.chip{white-space:nowrap;border:1px solid var(--border);border-radius:999px;background:var(--card);color:var(--text2);padding:7px 14px;font-size:12px;font-weight:700;cursor:pointer;flex-shrink:0}
.chip.active{background:rgba(214,166,63,.15);border-color:var(--gold);color:var(--gold2)}

/* ── SAAT BAŞLIĞI ── */
.time-head{display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--bg3);border-left:3px solid var(--gold);border-radius:0 8px 8px 0;margin:12px 0 6px}
.time-head .th-time{font-size:18px;font-weight:900;color:var(--gold2)}
.time-head .th-cnt{font-size:12px;color:var(--text2)}

/* ── REZ KART (kompakt) ── */
.rez-card{background:var(--card);border:1px solid var(--border);border-radius:12px;margin-bottom:6px;padding:10px 12px;position:relative;border-left:4px solid var(--border)}
.rez-card.rc-inside{border-left-color:var(--gold2)}
.rez-card.rc-done{border-left-color:var(--green)}
.rez-card.rc-cancel{opacity:.45}
.rez-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.rez-hotel{font-size:14px;font-weight:900;flex:1;min-width:120px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rez-badge{border-radius:999px;padding:3px 10px;font-size:10px;font-weight:900;border:1px solid}
.rez-badge.bwait{color:#ccc;background:#1e2030;border-color:#333}
.rez-badge.binside{color:var(--gold2);background:#3a1f00;border-color:#a06010}
.rez-badge.bdone{color:#b9ffd0;background:#0a3d24;border-color:#1a6040}
.rez-badge.bcancel{color:#888;background:#1a1a1a;border-color:#333}
.rez-meta{font-size:12px;color:var(--text2);margin-top:5px;display:flex;gap:12px;flex-wrap:wrap}
.rez-meta b{color:var(--text)}
.rez-sale{font-size:11px;font-weight:900;color:var(--blue)}
.rez-bos{font-size:11px;font-weight:900;color:var(--red)}
.rez-staff{font-size:11px;color:var(--text2);margin-top:4px}

/* ── RAPOR ── */
.range-bar{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
.rbtn{background:var(--bg3);border:1px solid var(--border);border-radius:8px;color:var(--text2);padding:7px 12px;font-size:12px;font-weight:700;cursor:pointer}
.rbtn.gold{background:linear-gradient(135deg,#d6a63f,#a07830);color:#1a0f00;border:none}
.date-range{display:flex;gap:6px;align-items:center;flex-wrap:wrap;margin-bottom:10px}
.date-range input{flex:1;min-width:120px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;color:var(--text);padding:7px 10px;font-size:13px}
.date-range input::-webkit-calendar-picker-indicator{filter:invert(0.7) brightness(1.5);opacity:.8}
.rapor-otel{background:var(--card);border:1px solid var(--border);border-radius:14px;margin-bottom:10px;overflow:hidden}
.ro-head{background:var(--bg3);padding:12px 14px}
.ro-name{font-size:14px;font-weight:900;color:var(--gold2)}
.ro-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;padding:10px}
.ro-s{background:var(--bg2);border-radius:8px;text-align:center;padding:10px 4px}
.ro-s b{display:block;font-size:20px;font-weight:900;color:var(--gold2);line-height:1}
.ro-s span{font-size:9px;color:var(--text2);text-transform:uppercase;font-weight:700}
.ro-s.rss b{color:var(--blue)}.ro-s.rsb b{color:var(--red)}.ro-s.rsd b{color:var(--green)}

/* ── PERSONEL PANELİ ── */
.staff-section{margin-bottom:10px}
.staff-sec-lbl{font-size:9px;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;font-weight:700}
.staff-pills{display:flex;flex-wrap:wrap;gap:5px}
.spill{border-radius:999px;padding:5px 12px;font-size:12px;font-weight:700}
.spill-free{background:rgba(53,217,121,.12);border:1px solid rgba(53,217,121,.3);color:#6ee7a0}
.spill-busy{background:rgba(214,166,63,.12);border:1px solid rgba(214,166,63,.3);color:var(--gold2)}
.spill-off{background:rgba(156,163,175,.1);border:1px solid #374151;color:#9ca3af}
.cnt-badge{font-size:9px;color:var(--gold2);margin-left:2px;font-weight:900}

/* ── LOADING ── */
.loading{text-align:center;padding:40px;color:var(--text2);font-size:14px}
</style>

  <!-- PWA -->
  <link rel="manifest" href="/patron/manifest.json">
  <meta name="theme-color" content="#d6a63f">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Piano Patron">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">
  <script>
    if("serviceWorker" in navigator){
      navigator.serviceWorker.register("/patron/sw.js",{scope:"/patron/"})
        .then(r=>console.log("PWA OK"))
        .catch(e=>console.log("PWA ERR",e));
    }
  </script>
</head>
<body>

<!-- HEADER -->
<div class="hdr">
  <div class="hdr-top">
    <span class="hdr-brand">✦ PATRON PANELİ</span>
    <button class="btn-refresh" onclick="loadAll()" title="Yenile">↺</button>
    <button class="btn-refresh" onclick="logout()" title="Çıkış" style="font-size:13px">⏏</button>
  </div>
  <div class="hdr-date-row">
    <span class="date-lbl">Tarih</span>
    <input type="date" class="date-input" id="pDate">
    <span class="date-display" id="pDateTxt"></span>
    <button class="btn-show" onclick="loadAll()">Göster</button>
  </div>
</div>

<!-- SAYFALAR -->

<!-- 1: GÜNLÜK -->
<div class="page active" id="pgDaily">
  <div class="sum-grid" id="sumGrid"></div>
  <div class="chips" id="chipBar"></div>
  <div id="resList"></div>
</div>

<!-- 2: PERSONEL -->
<div class="page" id="pgStaff">
  <div id="staffPanel"></div>
</div>

<!-- 3: RAPOR -->
<div class="page" id="pgReport">
  <div class="range-bar">
    <button class="rbtn" onclick="setRange('today')">Bugün</button>
    <button class="rbtn" onclick="setRange('week')">Bu Hafta</button>
    <button class="rbtn" onclick="setRange('month')">Bu Ay</button>
  </div>
  <div class="date-range">
    <input type="date" id="rStart">
    <span style="color:var(--text2)">—</span>
    <input type="date" id="rEnd">
    <button class="rbtn gold" onclick="loadReport()">Göster</button>
  </div>
  <div id="reportOut"></div>
</div>

<!-- BOTTOM NAV -->
<div class="bottom-nav">
  <button class="bnav-btn active" id="nb1" onclick="goPage('pgDaily','nb1')">
    <span class="ico">📋</span>Günlük
  </button>
  <button class="bnav-btn" id="nb2" onclick="goPage('pgStaff','nb2')">
    <span class="ico">👥</span>Personel
  </button>
  <button class="bnav-btn" id="nb3" onclick="goPage('pgReport','nb3')">
    <span class="ico">📊</span>Rapor
  </button>
</div>

<script src="../config/config.js?v=20260516-patron-mobile"></script>
<script src="../config/firebase.js?v=20260516-patron-mobile"></script>
<script src="../assets/common.js?v=20260516-patron-mobile"></script>
<script src="../assets/firebase-api.js?v=20260516-patron-mobile"></script>
<script>
// Auth
(function(){const u=JSON.parse(sessionStorage.getItem('pianoUser')||'null');if(!u||!['patron','admin','boss'].includes(u.role)){sessionStorage.removeItem('pianoUser');window.location.replace('../giris/index.html');}window._pianoUser=u;})();
function logout(){sessionStorage.removeItem('pianoUser');window.location.href='../giris/index.html';}

let allRes=[], allStaff=[], selHotel='', selFilter='';

const pax    = r=>(Number(r.adult)||0)+(Number(r.child)||0);
const isSale = r=>String(r.satis||'').toUpperCase()==='TRUE';
const isDone = r=>String(r.cikti||'').toUpperCase()==='TRUE';
const isIn   = r=>String(r.girdi||'').toUpperCase()==='TRUE'&&!isDone(r);
const isWait = r=>!isIn(r)&&!isDone(r)&&r.status!=='CANCELLED';
const isBos  = r=>isDone(r)&&!isSale(r);

function esc(v){return String(v||'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}

function counts(list){
  return{
    total:list.length,
    pax:list.reduce((s,r)=>s+pax(r),0),
    wait:list.filter(isWait).length,
    inside:list.filter(isIn).length,
    done:list.filter(isDone).length,
    satis:list.filter(isSale).length,
    bos:list.filter(isBos).length
  };
}

// ── Navigation ──
function goPage(pageId, btnId){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById(pageId).classList.add('active');
  document.querySelectorAll('.bnav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById(btnId).classList.add('active');
  if(pageId==='pgStaff') renderStaff();
}

// ── Visible list ──
function visible(){
  let list = selHotel ? allRes.filter(r=>r.hotel===selHotel) : allRes;
  if(selFilter==='wait')   list=list.filter(isWait);
  if(selFilter==='inside') list=list.filter(isIn);
  if(selFilter==='done')   list=list.filter(isDone);
  if(selFilter==='satis')  list=list.filter(isSale);
  if(selFilter==='bos')    list=list.filter(isBos);
  return list;
}

// ── Summary ──
function renderSum(){
  const base = selHotel ? allRes.filter(r=>r.hotel===selHotel) : allRes;
  const c = counts(base);
  const items=[
    {k:'',    lbl:'Toplam',     cls:'',          val:c.total},
    {k:'wait',lbl:'Bekleyen',   cls:'',          val:c.wait},
    {k:'inside',lbl:'İçeride', cls:'sc-inside',  val:c.inside},
    {k:'done',lbl:'Tamamlandı',cls:'sc-done',    val:c.done},
    {k:'satis',lbl:'Satış ✦',  cls:'sc-satis',   val:c.satis},
    {k:'bos', lbl:'Boş ✦',     cls:'sc-bos',     val:c.bos},
  ];
  sumGrid.innerHTML=items.map(it=>`
    <div class="sum-card ${it.cls} ${selFilter===it.k&&it.k?'active-filter':''}" onclick="setFilter('${it.k}')">
      <div class="sum-val">${it.val}</div>
      <div class="sum-lbl">${it.lbl}</div>
    </div>`).join('');
}

function setFilter(k){ selFilter=selFilter===k&&k?'':k; renderSum(); renderList(); }
function setHotel(h){ selHotel=h; selFilter=''; renderSum(); renderChips(); renderList(); }

// ── Chips ──
function renderChips(){
  const names=[...new Set(allRes.map(r=>r.hotel).filter(Boolean))].sort((a,b)=>a.localeCompare(b,'tr'));
  chipBar.innerHTML=`<button class="chip ${!selHotel?'active':''}" onclick="setHotel('')">Tüm</button>`
    +names.map(h=>`<button class="chip ${selHotel===h?'active':''}" onclick="setHotel('${esc(h)}')">${esc(h)}</button>`).join('');
}

// ── Rez List ──
function renderList(){
  const list=visible();
  if(!list.length){
    resList.innerHTML='<div class="loading">Kayıt yok.</div>';return;
  }
  const grp={};
  list.forEach(r=>{(grp[r.time]??=[]).push(r);});
  resList.innerHTML=Object.keys(grp).sort().map(t=>`
    <div class="time-head">
      <span class="th-time">⏰ ${t}</span>
      <span class="th-cnt">${grp[t].length} rezervasyon</span>
    </div>
    ${grp[t].map(r=>{
      const cls=r.status==='CANCELLED'?'rc-cancel':isDone(r)?'rc-done':isIn(r)?'rc-inside':'';
      const badgeCls=r.status==='CANCELLED'?'bcancel':isDone(r)?'bdone':isIn(r)?'binside':'bwait';
      const badgeTxt=r.status==='CANCELLED'?'İPTAL':isDone(r)?'ÇIKTI':isIn(r)?'İÇERİDE':'BEKLİYOR';
      const staffTxt=[r.staff1,r.staff2,r.staff3,r.staff4].filter(Boolean).join(' · ');
      return `<div class="rez-card ${cls}">
        <div class="rez-row">
          <span class="rez-hotel">${esc(r.hotel)}</span>
          <span class="rez-badge ${badgeCls}">${badgeTxt}</span>
          ${isSale(r)?'<span class="rez-sale">SATIŞ</span>':isDone(r)?'<span class="rez-bos">BOŞ</span>':''}
        </div>
        <div class="rez-meta">
          <span>👤 <b>${pax(r)}</b> kişi</span>
          <span>🌍 <b>${esc(r.nation)}</b></span>
          ${r.kart?`<span>💳 <b>${esc(r.kart)}</b></span>`:''}
          ${r.ayak?`<span>🚗 <b>${esc(r.ayak)}</b></span>`:''}
        </div>
        ${staffTxt?`<div class="rez-staff">🧑 ${esc(staffTxt)}</div>`:''}
        ${r.notes?`<div class="rez-staff" style="color:#7c80a0">📝 ${esc(r.notes)}</div>`:''}
      </div>`;
    }).join('')}`).join('');
}

// ── Personel ──
function renderStaff(){
  const busy=new Set();
  allRes.forEach(r=>{
    if(r.status==='CANCELLED') return;
    if(isDone(r)) return;
    [r.staff1,r.staff2,r.staff3,r.staff4].filter(Boolean).forEach(n=>busy.add(n));
  });
  const progCount={};
  allRes.forEach(r=>{
    if(r.status==='CANCELLED') return;
    [r.staff1,r.staff2,r.staff3,r.staff4].filter(Boolean).forEach(n=>{progCount[n]=(progCount[n]||0)+1;});
  });
  const offNames=new Set();
  allStaff.forEach(s=>{
    if(String(s.offDates||'').split(',').map(x=>x.trim()).includes(pDate.value)) offNames.add(s.name);
  });
  const active=allStaff.filter(s=>s.status==='ACTIVE');
  const freeList=active.filter(s=>!busy.has(s.name)&&!offNames.has(s.name));
  const busyList=active.filter(s=>busy.has(s.name));
  const offList=allStaff.filter(s=>offNames.has(s.name));

  function pills(arr, cls){
    if(!arr.length) return '<span style="color:var(--text2);font-size:12px">—</span>';
    return arr.map(s=>{
      const cnt=progCount[s.name]||0;
      return `<span class="spill ${cls}">${s.name.split(' ')[0]}${cnt?`<span class="cnt-badge">(${cnt})</span>`:''}  </span>`;
    }).join('');
  }

  staffPanel.innerHTML=`
    <div class="staff-section">
      <div class="staff-sec-lbl">🟢 Boşta (${freeList.length})</div>
      <div class="staff-pills">${pills(freeList,'spill-free')}</div>
    </div>
    <div class="staff-section">
      <div class="staff-sec-lbl">🟡 Programda (${busyList.length})</div>
      <div class="staff-pills">${pills(busyList,'spill-busy')}</div>
    </div>
    <div class="staff-section">
      <div class="staff-sec-lbl">⚫ İzinli (${offList.length})</div>
      <div class="staff-pills">${pills(offList,'spill-off')}</div>
    </div>`;
}

// ── Rapor ──
function setRange(r){
  const t=todayStr();
  if(r==='today'){rStart.value=t;rEnd.value=t;}
  else if(r==='week'){rStart.value=weekStart(t);rEnd.value=t;}
  else if(r==='month'){rStart.value=monthStart(t);rEnd.value=t;}
  loadReport();
}

async function loadReport(){
  reportOut.innerHTML='<div class="loading">Yükleniyor...</div>';
  const s=rStart.value,e=rEnd.value;
  const all=(await getReservations()).filter(r=>r.status!=='CANCELLED'&&(!s||r.date>=s)&&(!e||r.date<=e));
  const grp={};
  all.forEach(r=>(grp[r.hotel||'İsimsiz']??=[]).push(r));
  const totalAll=counts(all);
  reportOut.innerHTML=`
    <div style="background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px;margin-bottom:12px">
      <div style="font-size:11px;color:var(--text2);margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px">GENEL TOPLAM</div>
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;text-align:center">
        <div><div style="font-size:22px;font-weight:900;color:var(--gold2)">${totalAll.total}</div><div style="font-size:9px;color:var(--text2)">REZ</div></div>
        <div><div style="font-size:22px;font-weight:900;color:var(--blue)">${totalAll.satis}</div><div style="font-size:9px;color:var(--text2)">SATIŞ</div></div>
        <div><div style="font-size:22px;font-weight:900;color:var(--red)">${totalAll.bos}</div><div style="font-size:9px;color:var(--text2)">BOŞ</div></div>
      </div>
    </div>
    ${Object.keys(grp).sort((a,b)=>a.localeCompare(b,'tr')).map(hotel=>{
      const c=counts(grp[hotel]);
      return `<div class="rapor-otel">
        <div class="ro-head"><div class="ro-name">▣ ${esc(hotel)}</div></div>
        <div class="ro-stats">
          <div class="ro-s"><b>${c.total}</b><span>Rez</span></div>
          <div class="ro-s rsd"><b>${c.done}</b><span>Bitti</span></div>
          <div class="ro-s rss"><b>${c.satis}</b><span>Satış</span></div>
          <div class="ro-s rsb"><b>${c.bos}</b><span>Boş</span></div>
        </div>
      </div>`;
    }).join('')||'<div class="loading">Kayıt yok.</div>'}`;
}

// ── Load ──
async function loadAll(){
  pDateTxt.innerText=fmtDate(pDate.value);
  resList.innerHTML='<div class="loading">Yükleniyor...</div>';
  [allRes, allStaff]=await Promise.all([
    getReservations(pDate.value),
    getStaffWithOffDates().catch(()=>[])
  ]);
  if(!Array.isArray(allRes)) allRes=[];
  if(!Array.isArray(allStaff)) allStaff=[];
  selHotel=''; selFilter='';
  renderSum(); renderChips(); renderList();
  // personel sayfası açıksa yenile
  if(document.getElementById('pgStaff').classList.contains('active')) renderStaff();
}

// Bootstrap
