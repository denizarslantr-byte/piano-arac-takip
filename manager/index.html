<!DOCTYPE html><html lang="tr"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Piano Deri — Yönetici</title><style>
:root{--gold:#d8aa4b;--gold2:#f1d48a;--bg:#080808;--card:#17181f;--card2:#20222b;--text:#f3f4f6;--muted:#9ca3af;--b:rgba(216,170,75,.32);--ok:#22c55e;--warn:#f59e0b;--blue:#60a5fa}
*{box-sizing:border-box} body{margin:0;background:var(--bg);color:var(--text);font-family:Arial,"Segoe UI",sans-serif;font-size:14px}.app{padding:14px;max-width:1280px;margin:auto}.brand{text-align:center;padding:8px 0 18px}.brand .p{font-family:Georgia,serif;font-size:44px;color:var(--gold2);line-height:.8}.brand .n{font-family:Georgia,serif;letter-spacing:6px;font-size:25px}.brand .s{color:var(--gold);letter-spacing:4px;font-size:11px}.panel{background:var(--card);border:1px solid var(--b);border-radius:14px;padding:14px;margin-bottom:12px;box-shadow:0 12px 34px rgba(0,0,0,.25)}.toolbar{display:flex;gap:10px;align-items:end;flex-wrap:wrap}.toolbar>div{display:flex;flex-direction:column;gap:5px}label{font-size:11px;color:var(--gold2);font-weight:700;text-transform:uppercase}input,select{background:#0d0e13;border:1px solid rgba(255,255,255,.12);border-radius:8px;color:var(--text);padding:10px 11px;min-width:160px}.btn{border:0;border-radius:9px;padding:10px 14px;font-weight:800;cursor:pointer}.btn-gold{background:linear-gradient(135deg,var(--gold2),var(--gold));color:#1a1204}.btn-dark{background:#262832;color:var(--gold2);border:1px solid rgba(255,255,255,.1)}.grid{display:grid;grid-template-columns:repeat(6,1fr);gap:10px}.stat{background:var(--card2);border:1px solid rgba(255,255,255,.08);border-radius:12px;text-align:center;padding:12px}.stat b{display:block;font-size:26px;color:var(--gold2)}.stat span{font-size:11px;color:var(--muted);text-transform:uppercase}.tablewrap{overflow:auto}table{width:100%;border-collapse:collapse;font-size:13px}th{color:var(--gold2);font-size:11px;text-transform:uppercase;text-align:left;background:#101116}th,td{padding:9px 10px;border-bottom:1px solid rgba(255,255,255,.07)}tr:hover{background:rgba(255,255,255,.03)}.hotel-title{font-weight:900;color:var(--gold2);font-size:16px;margin:14px 0 6px}.mini{font-size:12px;color:var(--muted)}.badge{display:inline-block;border-radius:999px;padding:3px 8px;font-size:11px;font-weight:800}.sale{background:rgba(34,197,94,.18);color:#86efac}.empty{padding:28px;text-align:center;color:var(--muted)}@media(max-width:760px){.grid{grid-template-columns:repeat(2,1fr)}.brand .n{font-size:18px}.toolbar{display:block}.toolbar>div{margin-bottom:8px}input,select{width:100%}}
</style></head><body><div class="app"><div class="brand"><div class="p">P</div><div class="n">PIANO DERİ</div><div class="s">YÖNETİCİ PANELİ</div></div><div class="panel toolbar"><div><label>Tarih</label><input type="date" id="date1"></div><div><label>Otel</label><select id="hotelSel"><option value="">Tüm Oteller</option></select></div><button class="btn btn-gold" onclick="load()">Göster</button><button class="btn btn-dark" onclick="load()">↺ Yenile</button></div><div class="panel"><div class="grid"><div class="stat"><b id="stRes">0</b><span>Rezervasyon</span></div><div class="stat"><b id="stPax">0</b><span>Pax</span></div><div class="stat"><b id="stPending">0</b><span>Bekleyen</span></div><div class="stat"><b id="stInside">0</b><span>İçeride</span></div><div class="stat"><b id="stDone">0</b><span>Tamamlandı</span></div><div class="stat"><b id="stSatis">0</b><span>Satış</span></div></div></div><div id="list" class="panel tablewrap"></div><div class="mini" id="footer"></div></div><script src="../config/config.js?v=20260515-final-reports"></script>
<script src="../config/firebase.js?v=20260515-final-reports"></script>
<script src="../assets/common.js?v=20260515-final-reports"></script>
<script src="../assets/firebase-api.js?v=20260515-final-reports"></script><script>
let all=[],hotels=[]; const pax=r=>(Number(r.adult)||0)+(Number(r.child)||0); const status=r=>r.status==='CANCELLED'?'İPTAL':String(r.cikti).toUpperCase()==='TRUE'?'ÇIKTI':String(r.girdi).toUpperCase()==='TRUE'?'İÇERİDE':'BEKLİYOR';
function filt(){const h=hotelSel.value; return all.filter(r=>!h||r.hotel===h).sort((a,b)=>String(a.hotel||'').localeCompare(String(b.hotel||''),'tr')||String(a.time||'').localeCompare(String(b.time||'')));}
function render(){const data=filt(); stRes.innerText=data.length; stPax.innerText=data.reduce((s,r)=>s+pax(r),0); stPending.innerText=data.filter(r=>status(r)==='BEKLİYOR').length; stInside.innerText=data.filter(r=>status(r)==='İÇERİDE').length; stDone.innerText=data.filter(r=>status(r)==='ÇIKTI').length; stSatis.innerText=data.filter(r=>String(r.satis).toUpperCase()==='TRUE').length; const groups={}; data.forEach(r=>(groups[r.hotel]??=[]).push(r)); list.innerHTML=Object.keys(groups).sort((a,b)=>a.localeCompare(b,'tr')).map(h=>`<div class="hotel-title">🏨 ${h}</div><table><thead><tr><th>Saat</th><th>Pax</th><th>Uyruk</th><th>Durum</th><th>Satış</th><th>Not</th></tr></thead><tbody>${groups[h].sort((a,b)=>String(a.time||'').localeCompare(String(b.time||''))).map(r=>`<tr><td><b>${r.time||''}</b></td><td>${pax(r)}</td><td>${r.nation||''}</td><td>${status(r)}</td><td>${String(r.satis).toUpperCase()==='TRUE'?'SATIŞ':'Boş'}</td><td>${r.notes||''}</td></tr>`).join('')}</tbody></table>`).join('')||'<div class="empty">Rezervasyon yok.</div>';}
async function fillHotels(){hotels=await getHotels(); const names=[...new Set(hotels.map(h=>h.hotel).filter(Boolean))].sort((a,b)=>a.localeCompare(b,'tr')); hotelSel.innerHTML='<option value="">Tüm Oteller</option>'+names.map(h=>`<option value="${h}">${h}</option>`).join('');}
async function load(){list.innerHTML='<div class="empty">Yükleniyor...</div>'; all=await getReservations(date1.value); render(); footer.innerText='Son güncelleme: '+new Date().toLocaleTimeString('tr-TR');}
date1.value=todayStr(); hotelSel.addEventListener('change',render); fillHotels(); load(); setInterval(load,10000);
</script></body></html>
